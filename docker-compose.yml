services:
  hgt:
    build: .
    container_name: hgt-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - WEB_ORIGIN=http://47.239.5.69:4000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-long-random-string}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-change-me}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=hgt
      - DB_PASSWORD=${DB_PASSWORD:-hgt_password}
      - DB_NAME=hgt
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: hgt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: hgt
      MYSQL_USER: hgt
      MYSQL_PASSWORD: ${DB_PASSWORD:-hgt_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
