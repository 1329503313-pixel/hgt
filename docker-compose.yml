services:
  hgt:
    build: .
    container_name: hgt-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - WEB_ORIGIN=${WEB_ORIGIN:?WEB_ORIGIN must be set}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:?ADMIN_DEFAULT_PASSWORD must be set}
      - DB_HOST=mysql-docker-mysql-1
      - DB_PORT=3306
      - DB_USER=hgt
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_NAME=hgt
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - RUN_DB_MIGRATIONS=${RUN_DB_MIGRATIONS:-true}
    networks:
      - mysql-docker_default

networks:
  mysql-docker_default:
    external: true
