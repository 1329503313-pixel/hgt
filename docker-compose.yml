services:
  hgt:
    build: .
    container_name: hgt-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - WEB_ORIGIN=http://47.239.5.69:4000
      - JWT_SECRET=${JWT_SECRET:-hgt-jwt-2026-fixed}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-change-me}
      - DB_HOST=mysql-docker-mysql-1
      - DB_PORT=3306
      - DB_USER=hgt
      - DB_PASSWORD=${DB_PASSWORD:-hgt_password}
      - DB_NAME=hgt
    networks:
      - mysql-docker_default

networks:
  mysql-docker_default:
    external: true
